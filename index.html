<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PEACE PRIDE | 神奈川ユースアクションフェス2026</title>
    <style>
        /* カラーパレット（PEACE PRIDEブルーを基調） */
        :root {
            --main-blue: #2B90D9; /* スカイブルー */
            --deep-blue: #003F8E; /* ベイスターズ風ディープブルー */
            --accent-gold: #C2A059;
            --text-dark: #1A1A1A;
            --bg-light: #F4F7F9;
        }
        
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            margin: 0;
            background-color: var(--bg-light);
            color: var(--text-dark);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* アニメーション用クラス */
        .fade-in {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }
        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ヒーローエリア（トップ画面） */
        .hero {
            height: 100vh;
            /* 鮮やかなブルーのグラデーション背景 */
            background: linear-gradient(135deg, rgba(43,144,217,0.9) 0%, rgba(0,63,142,0.9) 100%), url('https://images.unsplash.com/photo-1540822836262-1b156736561e?auto=format&fit=crop&q=80&w=1600') center/cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            position: relative;
            padding: 20px;
            box-sizing: border-box;
        }

        .hero-subtitle {
            font-size: 1rem;
            font-weight: bold;
            letter-spacing: 0.1em;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .hero-title {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 0.05em;
            line-height: 1.1;
            margin: 0 0 15px 0;
            text-shadow: 0 4px 12px rgba(0,0,0,0.4);
        }

        .hero-catch {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 40px;
        }

        .hero-date-venue {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 15px 30px;
            border-radius: 50px;
        }
        
        .hero-date-venue p {
            margin: 0;
            font-size: 1.5rem;
            font-weight: bold;
        }

        /* スクロールダウン指示アイコン */
        .scroll-down {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            animation: bounce 2s infinite;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0) translateX(-50%); }
            40% { transform: translateY(-15px) translateX(-50%); }
            60% { transform: translateY(-7px) translateX(-50%); }
        }

        /* 共通セクション */
        .section {
            padding: 80px 20px;
            max-width: 600px; /* スマホで見やすい幅に制限 */
            margin: 0 auto;
        }

        .section-title {
            font-size: 2rem;
            color: var(--deep-blue);
            text-align: center;
            margin-bottom: 40px;
            font-weight: 900;
            letter-spacing: 0.05em;
        }

        /* メッセージエリア */
        .message-box {
            background: white;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border-top: 5px solid var(--main-blue);
            text-align: center;
        }

        .message-box h3 {
            color: var(--deep-blue);
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .message-box p {
            font-size: 1.05rem;
            line-height: 1.8;
            margin-bottom: 15px;
            color: #444;
        }

        /* 当日用 NEWS エリア */
        .news-container {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        
        .news-item {
            padding: 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: flex-start;
        }
        .news-item:last-child {
            border-bottom: none;
        }

        .news-time {
            color: var(--main-blue);
            font-weight: bold;
            font-size: 0.9rem;
            min-width: 60px;
            padding-top: 3px;
        }

        .news-text {
            font-size: 1rem;
            line-height: 1.5;
            margin: 0;
        }

        .news-tag {
            display: inline-block;
            background: #FFEBEB;
            color: #D32F2F;
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 4px;
            margin-right: 8px;
            font-weight: bold;
        }

        /* スマホ向け調整 */
        @media (max-width: 600px) {
            .hero-title { font-size: 3.2rem; }
            .hero-date-venue p { font-size: 1.2rem; }
            .section { padding: 60px 20px; }
        }
    </style>
</head>
<body>

    <div class="hero">
        <div class="fade-in">
            <div class="hero-subtitle">神奈川ユースアクションフェス2026</div>
            <h1 class="hero-title">PEACE<br>PRIDE</h1>
            <div class="hero-catch">歌おう！世界へ、未来へ。</div>
            <div class="hero-date-venue">
                <p>2026.9.12 (Sat)<br><span style="font-size:1rem; font-weight:normal;">YOKOHAMA STADIUM</span></p>
            </div>
        </div>
        <div class="scroll-down">
            ▼ SCROLL
        </div>
    </div>

    <div class="section">
        <div class="message-box fade-in">
            <h3>「平和」は<br>「わたし」から始まる</h3>
            <p>日々の暮らしの中に<br>平和への確かな一歩はある。</p>
            <p>誰もが「平和」を創る『主体者』。<br>その誇り (PRIDE)を胸に、<br>3万人の願いを、誓いを、<br>歌声に託します。</p>
        </div>
    </div>

    <div class="section" style="padding-top: 20px;">
        <h2 class="section-title fade-in">TODAY'S NEWS</h2>
        <div class="news-container fade-in">
            <div class="news-item">
                <div class="news-time">16:45</div>
                <div class="news-text">
                    <span class="news-tag">重要</span>
                    スタジアム周辺が大変混雑しております。入場ゲートには余裕を持ってお越しください。
                </div>
            </div>
            <div class="news-item">
                <div class="news-time">16:30</div>
                <div class="news-text">
                    開場いたしました。お席でのご飲食（アルコールを除く）は可能です。
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const elements = document.querySelectorAll('.fade-in');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.15 });

            elements.forEach(el => observer.observe(el));
            
            // ロード直後にヒーローエリアのアニメーションを発火
            setTimeout(() => {
                document.querySelector('.hero .fade-in').classList.add('visible');
            }, 100);
        });
    </script>
</body>
</html>
