<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KANAGAWA YOUTH ACTION FES</title>
    <style>
        /* ベイスターズ風のブルーを基調としたカラーパレット */
        :root {
            --bay-blue: #003F8E;
            --light-blue: #E6F0FA;
            --accent-gold: #C2A059;
            --text-dark: #1A1A1A;
        }
        body {
            font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            margin: 0;
            background-color: #FAFAFA;
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* 画面いっぱいのトップ画像 */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0, 63, 142, 0.6), rgba(0, 0, 0, 0.4)), url('https://images.unsplash.com/photo-1540822836262-1b156736561e?auto=format&fit=crop&q=80&w=1600') center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            position: relative;
        }
        .hero h1 {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 0.1em;
            line-height: 1.2;
            margin: 0;
            text-shadow: 0 4px 12px rgba(0,0,0,0.5);
        }

        /* セクション共通設定 */
        .section {
            padding: 100px 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        
        /* スクロールでフワッと現れるアニメーション（スターガイド風） */
        .fade-in {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 1s ease-out, transform 1s ease-out;
        }
        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* 大会意義の見出し */
        .title {
            font-size: 2.5rem;
            color: var(--bay-blue);
            text-align: center;
            margin-bottom: 50px;
            font-weight: 900;
        }
        .message-box {
            background: white;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border-top: 4px solid var(--accent-gold);
            font-size: 1.1rem;
            line-height: 2;
        }

        /* 開催概要カード */
        .info-wrapper {
            background-color: var(--bay-blue);
            color: white;
            padding: 60px 20px;
            margin-top: 60px;
        }
        .info-grid {
            max-width: 800px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .info-item {
            border: 1px solid rgba(255,255,255,0.2);
            padding: 30px;
            text-align: center;
        }
        .info-item h3 {
            color: var(--accent-gold);
            margin-top: 0;
            font-size: 1.2rem;
        }
        .info-item p {
            font-size: 1.8rem;
            font-weight: bold;
            margin: 0;
        }

        @media (max-width: 600px) {
            .hero h1 { font-size: 2.5rem; }
            .info-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="hero">
        <div class="fade-in">
            <h1>KANAGAWA<br>YOUTH<br>ACTION FES</h1>
        </div>
    </div>

    <div class="section">
        <h2 class="title fade-in">大会意義</h2>
        <div class="message-box fade-in">
            <p style="font-weight: bold; font-size: 1.4rem; color: var(--bay-blue);">「平和」は、一人の青年の熱と力から生まれる。</p>
            <p>明年の「原水爆禁止宣言」70周年へ、平和運動原点の地・神奈川の青年として、歌やダンスに平和を願う心を込め、ここから新たな前進を開始します。</p>
            <p>あなたも、私たちと共に、希望の未来を創りませんか。</p>
        </div>
    </div>

    <div class="info-wrapper">
        <h2 class="title fade-in" style="color: white;">開催概要</h2>
        <div class="info-grid fade-in">
            <div class="info-item">
                <h3>日時</h3>
                <p>9.12 (Sun)<br><span style="font-size:1.2rem">17:30～19:00</span></p>
            </div>
            <div class="info-item">
                <h3>会場</h3>
                <p>横浜スタジアム</p>
            </div>
        </div>
    </div>

    <!-- スクロールアニメーションを動かすための魔法のスクリプト -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const elements = document.querySelectorAll('.fade-in');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.1 });

            elements.forEach(el => observer.observe(el));
            
            // ロード直後にヒーローエリアのアニメーションを発火
            setTimeout(() => {
                document.querySelector('.hero .fade-in').classList.add('visible');
            }, 100);
        });
    </script>
</body>
</html>
